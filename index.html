<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kailash by Road — Sadhguru's Motorcycle Yatra · 2025 Route</title>
<meta name="description" content="Ride the 2025 route: Gorakhpur to Lake Manasarovar across Nepal and the Tibetan plateau. A cinematic replay of Sadhguru's motorcycle yatra to Kailash." />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Karla:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:        #0B1220;   /* himalayan night */
    --mist:       rgba(11,18,32,.78);
    --mist-soft:  rgba(11,18,32,.55);
    --snow:       #F2EFE7;   /* warm snow */
    --stone:      #97A0B0;   /* muted caption */
    --saffron:    #E8A13D;   /* marigold accent */
    --ochre:      #B0492F;   /* monastery red, sparse */
    --line:       rgba(242,239,231,.14);
    --display: 'Marcellus', serif;
    --body: 'Karla', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    font-family:var(--body); color:var(--snow); background:var(--ink);
    overflow:hidden;
  }
  #map{ position:fixed; inset:0; }
  #map canvas{ outline:none; }

  /* ---------- vignette so chrome sits legibly on satellite ---------- */
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:2;
    background:
      linear-gradient(180deg, rgba(11,18,32,.62) 0%, rgba(11,18,32,0) 22%),
      linear-gradient(0deg,   rgba(11,18,32,.78) 0%, rgba(11,18,32,0) 30%),
      linear-gradient(90deg,  rgba(11,18,32,.55) 0%, rgba(11,18,32,0) 34%);
  }

  /* ---------- masthead ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:22px 26px 0;
    pointer-events:none;
  }
  header > *{ pointer-events:auto; }
  .mast .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:.22em;
    text-transform:uppercase; color:var(--saffron); margin-bottom:6px;
  }
  .mast h1{
    font-family:var(--display); font-weight:400; font-size:clamp(26px,3.4vw,40px);
    letter-spacing:.04em; line-height:1.05;
  }
  .mast .sub{ font-size:13px; color:var(--stone); margin-top:6px; max-width:46ch; }
  .replay-badge{
    display:inline-block; margin-top:10px; padding:4px 10px;
    border:1px solid var(--line); border-radius:999px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--stone); background:var(--mist-soft);
    backdrop-filter:blur(6px);
  }

  .ride-btn{
    font-family:var(--body); font-weight:700; font-size:14px;
    color:var(--ink); background:var(--saffron);
    border:none; border-radius:999px; padding:12px 22px; cursor:pointer;
    display:flex; align-items:center; gap:9px;
    box-shadow:0 6px 24px rgba(232,161,61,.35);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .ride-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 28px rgba(232,161,61,.45); }
  .ride-btn:focus-visible{ outline:2px solid var(--snow); outline-offset:3px; }
  .ride-btn .glyph{ font-size:12px; }

  /* ---------- stage rail ---------- */
  nav.rail{
    position:fixed; left:26px; top:150px; bottom:150px; z-index:10;
    width:270px; overflow-y:auto; overscroll-behavior:contain;
    padding-right:6px;
    scrollbar-width:thin; scrollbar-color:rgba(242,239,231,.2) transparent;
  }
  .stage{
    display:block; width:100%; text-align:left; cursor:pointer;
    background:var(--mist-soft); backdrop-filter:blur(8px);
    border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; margin-bottom:8px; color:var(--snow);
    transition:border-color .2s ease, background .2s ease;
  }
  .stage:hover{ border-color:rgba(232,161,61,.5); }
  .stage:focus-visible{ outline:2px solid var(--saffron); outline-offset:2px; }
  .stage.active{ background:var(--mist); border-color:var(--saffron); }
  .stage .alt{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.12em;
    color:var(--saffron);
  }
  .stage .name{
    font-family:var(--display); font-size:16.5px; letter-spacing:.02em; margin-top:2px;
  }
  .stage .note{ font-size:12px; color:var(--stone); margin-top:3px; line-height:1.45; }

  /* ---------- altitude ribbon (signature) ---------- */
  footer.ribbon{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    padding:14px 26px 18px;
    background:linear-gradient(0deg, rgba(11,18,32,.92) 30%, rgba(11,18,32,0));
    pointer-events:none;
  }
  .ribbon-inner{ display:flex; align-items:flex-end; gap:22px; pointer-events:auto; }
  #profile{ flex:1; height:74px; display:block; }
  .altitude{
    text-align:right; min-width:170px;
  }
  .altitude .label{
    font-family:var(--mono); font-size:10.5px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--stone);
  }
  .altitude .value{
    font-family:var(--mono); font-weight:500; font-size:clamp(28px,3vw,38px);
    color:var(--snow); line-height:1.1; font-variant-numeric:tabular-nums;
  }
  .altitude .value .unit{ font-size:15px; color:var(--saffron); }
  .altitude .place{
    font-family:var(--display); font-size:14px; color:var(--stone);
    letter-spacing:.03em; margin-top:2px; min-height:18px;
  }

  /* ---------- rider marker ---------- */
  .rider{
    width:24px; height:48px; position:relative;
    filter:drop-shadow(0 2px 7px rgba(0,0,0,.65));
  }
  .rider svg{ position:relative; z-index:1; display:block; }
  .rider .pulse{
    position:absolute; left:50%; top:50%; z-index:0;
    width:34px; height:34px; margin:-17px 0 0 -17px; border-radius:50%;
    border:2px solid var(--saffron); opacity:.85;
    animation:pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{
    0%{ transform:scale(.6); opacity:.9; }
    100%{ transform:scale(2.1); opacity:0; }
  }
  .waypt{
    font-family:var(--mono); font-size:10px; letter-spacing:.1em;
    color:var(--snow); background:var(--mist);
    border:1px solid var(--line); border-radius:6px;
    padding:3px 7px; white-space:nowrap; backdrop-filter:blur(4px);
  }
  .waypt::before{
    content:''; display:inline-block; width:5px; height:5px; border-radius:50%;
    background:var(--saffron); margin-right:6px; vertical-align:1px;
  }

  /* ---------- loading ---------- */
  #boot{
    position:fixed; inset:0; z-index:50; background:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; transition:opacity .8s ease;
  }
  #boot.gone{ opacity:0; pointer-events:none; }
  #boot .adiyogi{
    max-width:min(240px,60vw); max-height:38vh; object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(232,161,61,.3));
  }
  #boot p{ font-family:var(--mono); font-size:12px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--stone); }

  /* ---------- responsive ---------- */
  @media (max-width: 860px){
    header{ padding:16px 16px 0; flex-direction:column; gap:12px; }
    .mast .sub{ display:none; }
    nav.rail{
      left:0; right:0; top:auto; bottom:118px; width:auto;
      display:flex; gap:8px; overflow-x:auto; overflow-y:hidden;
      padding:0 16px;
    }
    .stage{ min-width:200px; margin-bottom:0; }
    footer.ribbon{ padding:10px 16px 12px; }
    #profile{ height:48px; }
    .altitude{ min-width:120px; }
  }
  @media (prefers-reduced-motion: reduce){
    .rider .pulse{ animation:none; opacity:0; }
  }
</style>
</head>
<body>

<div id="boot" aria-hidden="true">
  <img class="adiyogi" src="adiyogi.png" alt="Adiyogi"
       onerror="this.style.display='none';document.getElementById('bootWord').style.display='block'" />
  <div id="bootWord" style="display:none;font-family:var(--display);font-size:30px;letter-spacing:.12em;color:var(--saffron)">KAILASH</div>
  <p>Loading the mountain</p>
</div>

<div id="map" role="application" aria-label="3D map of the 2025 Kailash motorcycle yatra route"></div>
<div class="vignette"></div>

<header>
  <div class="mast">
    <div class="eyebrow">Sadhguru · Motorcycle Yatra</div>
    <h1>Kailash by Road</h1>
    <p class="sub">Gorakhpur to Lake Manasarovar — 1,400&nbsp;km through monsoon Nepal and over the Tibetan plateau, from 84&nbsp;m to a 5,216&nbsp;m pass.</p>
    <span class="replay-badge">Replay · 2025 route · Live returns Aug 2026</span>
  </div>
  <button class="ride-btn" id="rideBtn" aria-pressed="false">
    <span class="glyph" id="rideGlyph">▶</span><span id="rideLabel">Ride the route</span>
  </button>
</header>

<nav class="rail" id="rail" aria-label="Stages of the yatra"></nav>

<footer class="ribbon">
  <div class="ribbon-inner">
    <canvas id="profile" aria-hidden="true"></canvas>
    <div class="altitude">
      <div class="label">Altitude</div>
      <div class="value"><span id="altVal">84</span> <span class="unit">M</span></div>
      <div class="place" id="placeVal">Gorakhpur, Uttar Pradesh</div>
    </div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js"></script>
<script>
/* ============================================================
   KAILASH BY ROAD — 2025 route replay
   Route geometry is snapped to real roads via OSRM (OpenStreetMap).
   Load order: route.json (baked) -> live OSRM snap -> straight lines.
   ============================================================ */

/* Anchors: [lng, lat, elevation_m] — the waypoints the ride passed through.
   OSRM fills in the road between them. */
const ANCHORS = [
  [83.3732, 26.7606,   84],  // 0  Gorakhpur
  [83.4163, 27.5057,  100],  // 1  Sunauli border
  [83.4484, 27.7006,  150],  // 2  Butwal
  [84.4300, 27.6900,  208],  // 3  Narayanghat
  [84.5630, 27.8570,  240],  // 4  Mugling
  [85.3240, 27.7172, 1350],  // 5  Kathmandu
  [85.4298, 27.6710, 1400],  // 6  Bhaktapur
  [85.5417, 27.6221, 1550],  // 7  Dhulikhel
  [85.9000, 27.7900,  900],  // 8  Barhabise
  [85.9610, 27.9737, 1770],  // 9  Kodari
  [85.9800, 27.9910, 2300],  // 10 Zhangmu
  [85.9820, 28.1550, 3750],  // 11 Nyalam
  [85.8500, 28.5500, 5050],  // 12 Tong La country
  [85.6000, 28.9000, 4590],  // 13 Peiku Tso
  [85.2325, 29.3288, 4640],  // 14 Saga
  [84.0300, 29.7700, 4570],  // 15 Zhongba
  [83.4500, 30.0700, 4610],  // 16 Paryang
  [82.3000, 30.4700, 5216],  // 17 Mayum La
  [81.7500, 30.7500, 4560],  // 18 Hor
  [81.3000, 30.7800, 4590],  // 19 Lake Manasarovar (Chiu)
  [81.2900, 30.9800, 4675]   // 20 Darchen
];

const STAGES = [
  { a:0,  alt:'84 M · AUG 9', name:'Gorakhpur',            note:'Flag-off from the Uttar Pradesh plains.', zoom:10.5, pitch:55, bearing:0 },
  { a:1,  alt:'100 M',        name:'Sunauli — Bhairahawa', note:'Crossing into Nepal at the land border.', zoom:11, pitch:55, bearing:10 },
  { a:2,  alt:'150 M',        name:'Butwal',               note:'Rain-soaked, under-construction monsoon roads begin.', zoom:11, pitch:58, bearing:60 },
  { a:4,  alt:'240 M',        name:'Mugling',              note:'Up the Trishuli valley on the Prithvi Highway.', zoom:10.8, pitch:60, bearing:70 },
  { a:5,  alt:'1,350 M',      name:'Kathmandu',            note:'Through the capital and the valley.', zoom:11.2, pitch:55, bearing:90 },
  { a:7,  alt:'1,550 M',      name:'Bhaktapur — Dhulikhel', note:'The old towns at the valley rim.', zoom:11.5, pitch:58, bearing:80 },
  { a:9,  alt:'1,770 M',      name:'Bhote Koshi Gorge',    note:'The Araniko Highway climbs a monsoon gorge to the frontier.', zoom:10.8, pitch:62, bearing:20 },
  { a:10, alt:'2,300 M',      name:'Zhangmu',              note:'Entering Tibet by road — no flights, no helicopters.', zoom:11.5, pitch:62, bearing:0 },
  { a:11, alt:'3,750 M',      name:'Nyalam',               note:'The wall of the Himalaya, climbed in switchbacks.', zoom:10.8, pitch:63, bearing:355 },
  { a:12, alt:'5,050 M',      name:'Tong La',              note:'Onto the plateau. Thin air, open sky.', zoom:9.8, pitch:60, bearing:320 },
  { a:14, alt:'4,640 M',      name:'Saga',                 note:'Across the Yarlung Tsangpo, west along G219.', zoom:10.2, pitch:58, bearing:290 },
  { a:16, alt:'4,610 M',      name:'Paryang',              note:'The long plateau run.', zoom:9.8, pitch:58, bearing:285 },
  { a:17, alt:'5,216 M',      name:'Mayum La',             note:'The highest point of the ride.', zoom:10, pitch:62, bearing:290 },
  { a:19, alt:'4,590 M',      name:'Lake Manasarovar',     note:'The ride concludes at the lake.', zoom:10.5, pitch:60, bearing:300 },
  { a:20, alt:'4,675 M',      name:'Darchen · Kailash',    note:'Beneath the mountain. The trek begins where the road ends.', zoom:10.8, pitch:65, bearing:340 }
];

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const bootMsg = document.querySelector('#boot p');

/* ---------- geometry helpers ---------- */
const R = 6371;
function hav(a, b){
  const dLat=(b[1]-a[1])*Math.PI/180, dLng=(b[0]-a[0])*Math.PI/180;
  const la1=a[1]*Math.PI/180, la2=b[1]*Math.PI/180;
  const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
function bearing(a, b){
  const la1=a[1]*Math.PI/180, la2=b[1]*Math.PI/180, dLng=(b[0]-a[0])*Math.PI/180;
  const y=Math.sin(dLng)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLng);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ---------- route resolution: baked file -> live OSRM -> straight ---------- */
const OSRM='https://router.project-osrm.org/route/v1/driving/';

async function osrmLeg(a, b){
  const url=OSRM+`${a[0]},${a[1]};${b[0]},${b[1]}?overview=full&geometries=geojson&steps=false`;
  const r=await fetch(url); if(!r.ok) throw new Error('osrm '+r.status);
  const j=await r.json(); if(j.code!=='Ok') throw new Error(j.code);
  return j.routes[0].geometry.coordinates;
}

async function snapAll(){
  const coords=[[ANCHORS[0][0],ANCHORS[0][1]]];
  const anchorIdx=[0];
  for(let k=0;k<ANCHORS.length-1;k++){
    bootMsg.textContent=`Snapping the route to the road · ${k+1}/${ANCHORS.length-1}`;
    let leg;
    try{ leg=await osrmLeg(ANCHORS[k],ANCHORS[k+1]); }
    catch(e){ leg=[[ANCHORS[k][0],ANCHORS[k][1]],[ANCHORS[k+1][0],ANCHORS[k+1][1]]]; }
    for(let i=1;i<leg.length;i++) coords.push(leg[i]);
    anchorIdx.push(coords.length-1);
  }
  return { coords, anchorIdx };
}

async function resolveRoute(){
  try{
    const r=await fetch('route.json',{cache:'no-cache'});
    if(r.ok){ const j=await r.json();
      if(j.coords && j.anchorIdx) return j; }
  }catch(e){}
  try{ return await snapAll(); }
  catch(e){
    return { coords:ANCHORS.map(p=>[p[0],p[1]]), anchorIdx:ANCHORS.map((_,i)=>i) };
  }
}

/* ---------- fine route + elevation model (filled after resolve) ---------- */
let ROUTE=[], CUM=[0], TOTAL=1, ANCHOR_CUM=[], PROF=[];

function buildFine(res){
  const {coords, anchorIdx}=res;
  CUM=[0];
  for(let i=1;i<coords.length;i++) CUM.push(CUM[i-1]+hav(coords[i-1],coords[i]));
  TOTAL=CUM[CUM.length-1];
  ANCHOR_CUM=anchorIdx.map(i=>CUM[i]);
  // interpolate anchor elevations along each snapped leg by distance
  ROUTE=coords.map((c,i)=>{
    let k=1; while(k<anchorIdx.length-1 && anchorIdx[k]<i) k++;
    const d0=CUM[anchorIdx[k-1]], d1=CUM[anchorIdx[k]];
    const t=d1>d0 ? (CUM[i]-d0)/(d1-d0) : 0;
    const ele=ANCHORS[k-1][2]+(ANCHORS[k][2]-ANCHORS[k-1][2])*Math.max(0,Math.min(1,t));
    return [c[0],c[1],ele];
  });
  // decimated elevation profile for the ribbon (fast to redraw every frame)
  PROF=[];
  const N=320;
  for(let s=0;s<=N;s++){ const d=TOTAL*s/N; const p=pointAt(d); PROF.push([d,p.ele]); }
}

function pointAt(d){
  d=Math.max(0,Math.min(TOTAL,d));
  let lo=0, hi=CUM.length-1;
  while(hi-lo>1){ const m=(lo+hi)>>1; (CUM[m]<=d)?lo=m:hi=m; }
  const t=(d-CUM[lo])/((CUM[hi]-CUM[lo])||1e-9);
  const a=ROUTE[lo], b=ROUTE[hi];
  return {
    lng:a[0]+(b[0]-a[0])*t, lat:a[1]+(b[1]-a[1])*t,
    ele:a[2]+(b[2]-a[2])*t, brg:bearing(a,b)
  };
}

/* ---------- map ---------- */
const map = new maplibregl.Map({
  container:'map',
  center:[83.3732,26.7606], zoom:10.5, pitch:55, bearing:0,
  maxPitch:75, attributionControl:{compact:true},
  style:{
    version:8,
    sources:{
      sat:{
        type:'raster', tileSize:256, maxzoom:17,
        tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        attribution:'Imagery © Esri, Maxar, Earthstar Geographics · Terrain © Mapzen/AWS · Routing © OSRM/OpenStreetMap'
      },
      dem:{
        type:'raster-dem', tileSize:256, maxzoom:13, encoding:'terrarium',
        tiles:['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png']
      }
    },
    layers:[
      { id:'bg', type:'background', paint:{ 'background-color':'#0B1220' } },
      { id:'sat', type:'raster', source:'sat',
        paint:{ 'raster-saturation':-0.12, 'raster-contrast':0.06, 'raster-brightness-max':0.94 } }
    ],
    sky:{
      'sky-color':'#0E1B33','horizon-color':'#3A4A66','fog-color':'#0B1220',
      'sky-horizon-blend':0.6,'horizon-fog-blend':0.55,
      'atmosphere-blend':['interpolate',['linear'],['zoom'],2,0.4,8,0.7,12,0.85]
    }
  }
});
map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'bottom-right');

let rider, inited=false;
const ready={ map:false, route:false };

map.on('load',()=>{
  map.setTerrain({ source:'dem', exaggeration:1.35 });
  ready.map=true; maybeInit();
});

resolveRoute().then(res=>{ buildFine(res); ready.route=true; maybeInit(); });

function maybeInit(){
  if(!ready.map || !ready.route || inited) return;
  inited=true;

  map.addSource('route',{
    type:'geojson', lineMetrics:true,
    data:{ type:'Feature', geometry:{ type:'LineString',
      coordinates:ROUTE.map(p=>[p[0],p[1]]) } }
  });
  map.addLayer({ id:'route-casing', type:'line', source:'route',
    layout:{ 'line-cap':'round','line-join':'round' },
    paint:{ 'line-color':'#0B1220','line-width':7,'line-opacity':0.55,'line-blur':1 } });
  map.addLayer({ id:'route-line', type:'line', source:'route',
    layout:{ 'line-cap':'round','line-join':'round' },
    paint:{ 'line-width':4,
      'line-gradient':['step',['line-progress'],'#E8A13D',0.0001,'rgba(232,161,61,0.18)'] } });

  const el=document.createElement('div'); el.className='rider';
  el.innerHTML=`<div class="pulse"></div>
    <svg viewBox="0 0 24 48" width="24" height="48" aria-label="Motorcycle">
      <rect x="9" y="1.5" width="6" height="10" rx="3" fill="#141922"/>
      <rect x="9" y="36.5" width="6" height="10" rx="3" fill="#141922"/>
      <rect x="3.2" y="11.5" width="17.6" height="2.6" rx="1.3" fill="#2A3140"/>
      <path d="M8.4,14 h7.2 l1.2,6 v14 a4.8,4.8 0 0 1 -9.6,0 v-14 z" fill="#CC2B1D"/>
      <path d="M9,10 h6 l-0.9,4 h-4.2 z" fill="#8FA3BF" opacity="0.85"/>
      <rect x="1.6" y="27" width="4.6" height="10" rx="2" fill="#232A38"/>
      <rect x="17.8" y="27" width="4.6" height="10" rx="2" fill="#232A38"/>
      <rect x="7.6" y="24" width="8.8" height="9.5" rx="3.6" fill="#39424F"/>
      <circle cx="12" cy="21.5" r="4" fill="#E8A13D"/>
      <circle cx="12" cy="3.5" r="1.2" fill="#F2EFE7"/>
    </svg>`;
  rider=new maplibregl.Marker({
    element:el, rotationAlignment:'map', pitchAlignment:'map'
  }).setLngLat([ROUTE[0][0],ROUTE[0][1]]).addTo(map);

  [0,5,10,11,14,17,19,20].forEach(a=>{
    const s=STAGES.find(x=>x.a===a); if(!s) return;
    const w=document.createElement('div'); w.className='waypt'; w.textContent=s.name.toUpperCase();
    new maplibregl.Marker({element:w, anchor:'left', offset:[10,0]})
      .setLngLat([ANCHORS[a][0],ANCHORS[a][1]]).addTo(map);
  });

  document.getElementById('boot').classList.add('gone');
  drawProfile(0);
}

/* ---------- stage rail ---------- */
const rail=document.getElementById('rail');
STAGES.forEach((s,idx)=>{
  const b=document.createElement('button');
  b.className='stage'; b.dataset.idx=idx;
  b.innerHTML=`<div class="alt">${s.alt}</div><div class="name">${s.name}</div><div class="note">${s.note}</div>`;
  b.addEventListener('click',()=>goToStage(idx));
  rail.appendChild(b);
});
function setActiveStage(idx){
  rail.querySelectorAll('.stage').forEach((el,i)=>el.classList.toggle('active',i===idx));
}
function stageForDist(d){
  let idx=0;
  STAGES.forEach((s,k)=>{ if(ANCHOR_CUM[s.a]<=d+0.5) idx=k; });
  return idx;
}
function goToStage(idx){
  if(!inited) return;
  stopRide();
  const s=STAGES[idx];
  setActiveStage(idx);
  setProgress(ANCHOR_CUM[s.a]);
  const opts={ center:[ANCHORS[s.a][0],ANCHORS[s.a][1]], zoom:s.zoom, pitch:s.pitch, bearing:s.bearing };
  if(reduceMotion){ map.jumpTo(opts); } else { map.flyTo({...opts, duration:2600, essential:true}); }
}

/* ---------- progress state ---------- */
const altVal=document.getElementById('altVal');
const placeVal=document.getElementById('placeVal');
let currentDist=0;

function setProgress(d){
  currentDist=d;
  const p=pointAt(d);
  const frac=Math.max(0.0001, d/TOTAL);
  map.setPaintProperty('route-line','line-gradient',
    ['step',['line-progress'],'#E8A13D',frac,'rgba(232,161,61,0.18)']);
  if(rider){ rider.setLngLat([p.lng,p.lat]); rider.setRotation(p.brg); }
  altVal.textContent=Math.round(p.ele).toLocaleString('en-IN');
  placeVal.textContent=STAGES[stageForDist(d)].name;
  drawProfile(frac);
  return p;
}

/* ---------- ride mode ---------- */
const rideBtn=document.getElementById('rideBtn');
const rideGlyph=document.getElementById('rideGlyph');
const rideLabel=document.getElementById('rideLabel');
let riding=false, raf=null, lastT=null, smoothBrg=null;
let camPos=null, pitchS=null, zoomS=null, speedS=null;
const KM_PER_SEC=6.5;
const LOOKAHEAD=0.6;        // km the camera "eyes" look up the road
const MAX_TURN=55;          // deg/sec cap on camera rotation

function angDiff(a,b){ return ((a-b+540)%360)-180; }

function stepRide(t){
  if(!riding) return;
  if(lastT===null){ lastT=t; raf=requestAnimationFrame(stepRide); return; }
  const dt=Math.min(0.1,(t-lastT)/1000); lastT=t;

  // corner braking: slow down when the road ahead bends hard
  const here=pointAt(currentDist);
  const near=pointAt(Math.min(TOTAL,currentDist+0.35));
  const turnAhead=Math.abs(angDiff(near.brg,here.brg));
  const targetSpeed=KM_PER_SEC*Math.max(0.35, 1-turnAhead/130);
  if(speedS===null) speedS=KM_PER_SEC;
  speedS+=(targetSpeed-speedS)*Math.min(1,dt*2.2);

  let d=currentDist+dt*speedS;
  if(d>=TOTAL) d=TOTAL;
  const p=setProgress(d);

  // look-ahead bearing: aim at a point up the road, not the local segment
  let brgT=p.brg;
  if(d+0.05<TOTAL){
    const look=pointAt(Math.min(TOTAL,d+LOOKAHEAD));
    brgT=bearing([p.lng,p.lat],[look.lng,look.lat]);
  }
  if(smoothBrg===null) smoothBrg=brgT;
  let dB=angDiff(brgT,smoothBrg)*Math.min(1,dt*1.8);
  const cap=MAX_TURN*dt;
  dB=Math.max(-cap,Math.min(cap,dB));
  smoothBrg=(smoothBrg+dB+360)%360;

  // camera trails the bike on a damped spring
  if(camPos===null) camPos={lng:p.lng,lat:p.lat};
  const k=Math.min(1,dt*3.2);
  camPos.lng+=(p.lng-camPos.lng)*k;
  camPos.lat+=(p.lat-camPos.lat)*k;

  // pitch/zoom ease between gorge and plateau framing
  const high=p.ele>4200;
  const pT=high?58:64, zT=high?10.2:11.3;
  if(pitchS===null){ pitchS=pT; zoomS=zT; }
  pitchS+=(pT-pitchS)*Math.min(1,dt*0.8);
  zoomS+=(zT-zoomS)*Math.min(1,dt*0.8);

  map.jumpTo({ center:[camPos.lng,camPos.lat], bearing:smoothBrg, pitch:pitchS, zoom:zoomS });
  setActiveStage(stageForDist(d));
  if(d>=TOTAL){ stopRide(); return; }
  raf=requestAnimationFrame(stepRide);
}
function startRide(){
  if(!inited) return;
  if(reduceMotion){
    goToStage((stageForDist(currentDist)+1)%STAGES.length); return;
  }
  if(currentDist>=TOTAL) setProgress(0);
  riding=true; lastT=null; smoothBrg=null;
  camPos=null; pitchS=null; zoomS=null; speedS=null;
  rideGlyph.textContent='❚❚'; rideLabel.textContent='Pause';
  rideBtn.setAttribute('aria-pressed','true');
  raf=requestAnimationFrame(stepRide);
}
function stopRide(){
  riding=false; if(raf) cancelAnimationFrame(raf);
  rideGlyph.textContent='▶'; rideLabel.textContent='Ride the route';
  rideBtn.setAttribute('aria-pressed','false');
}
rideBtn.addEventListener('click',()=>{ riding?stopRide():startRide(); });

/* ---------- elevation ribbon ---------- */
const canvas=document.getElementById('profile');
const ctx=canvas.getContext('2d');
function drawProfile(frac){
  if(!PROF.length) return;
  const dpr=window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=canvas.clientHeight;
  if(canvas.width!==w*dpr){ canvas.width=w*dpr; canvas.height=h*dpr; }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const maxE=5400, pad=2;
  const X=d=>pad+(d/TOTAL)*(w-2*pad);
  const Y=e=>h-4-(e/maxE)*(h-10);

  ctx.beginPath(); ctx.moveTo(X(PROF[0][0]),Y(PROF[0][1]));
  for(let i=1;i<PROF.length;i++) ctx.lineTo(X(PROF[i][0]),Y(PROF[i][1]));
  ctx.strokeStyle='rgba(242,239,231,0.28)'; ctx.lineWidth=1.5; ctx.stroke();

  const dNow=frac*TOTAL;
  ctx.beginPath(); ctx.moveTo(X(0),h);
  ctx.lineTo(X(PROF[0][0]),Y(PROF[0][1]));
  for(let i=1;i<PROF.length && PROF[i][0]<=dNow;i++) ctx.lineTo(X(PROF[i][0]),Y(PROF[i][1]));
  const pNow=pointAt(dNow);
  ctx.lineTo(X(dNow),Y(pNow.ele)); ctx.lineTo(X(dNow),h); ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(232,161,61,0.55)'); g.addColorStop(1,'rgba(232,161,61,0.08)');
  ctx.fillStyle=g; ctx.fill();

  ctx.beginPath(); ctx.arc(X(dNow),Y(pNow.ele),3.5,0,7);
  ctx.fillStyle='#E8A13D'; ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle='#0B1220'; ctx.stroke();
}
window.addEventListener('resize',()=>drawProfile(currentDist/TOTAL));

/* ---------- init ---------- */
setActiveStage(0);

</script>
</body>
</html>
